<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Clone - Premium Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Masonry Layout for Pinterest Grid */
        .pin-grid {
            columns: 2;
            column-gap: 16px;
        }
        @media (min-width: 640px) { .pin-grid { columns: 3; } }
        @media (min-width: 1024px) { .pin-grid { columns: 5; } }
        .pin-item {
            break-inside: avoid;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="bg-white font-sans antialiased text-gray-900">

    <nav class="sticky top-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between gap-3 z-50">
        <div onclick="switchTab('home')" class="text-red-600 font-extrabold text-2xl cursor-pointer tracking-tighter">P</div>
        
        <button onclick="switchTab('home')" id="btn-home" class="hidden sm:block bg-black text-white px-4 py-2 rounded-full text-sm font-semibold">Home</button>
        <button onclick="document.getElementById('file-input').click()" class="bg-gray-100 text-black px-4 py-2 rounded-full text-sm font-semibold hover:bg-gray-200">Create</button>

        <div class="flex-1 max-w-4xl relative">
            <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
            <input type="text" id="search-bar" onkeyup="filterPins()" placeholder="Search your pins..." class="w-full bg-[#E9E9E9] pl-10 pr-4 py-2 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <button onclick="switchTab('messages')" id="btn-messages" class="text-xl p-2 hover:bg-gray-100 rounded-full relative" title="Messages">
            💬
            <span id="msg-badge" class="absolute top-1 right-1 bg-red-500 w-2 h-2 rounded-full hidden"></span>
        </button>
        <button onclick="switchTab('profile')" id="btn-profile" class="text-xl p-2 hover:bg-gray-100 rounded-full" title="Profile">👤</button>
    </nav>

    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleUpload(event)">

    <div class="max-w-7xl mx-auto p-4">

        <section id="tab-home" class="tab-content">
            <div id="pin-container" class="pin-grid">
                </div>
        </section>

        <section id="tab-messages" class="tab-content hidden max-w-lg mx-auto bg-gray-50 border border-gray-200 rounded-2xl p-4 shadow-sm">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">💬 Inbox Messages</h2>
            <div class="space-y-3 h-80 overflow-y-auto p-2 bg-white rounded-xl border border-gray-100" id="chat-box">
                <div class="bg-gray-100 text-gray-800 p-3 rounded-xl rounded-tl-none text-sm max-w-[80%]">
                    Hey! Welcome to your Pinterest Clone. Upload some photos to show them in your profile!
                </div>
            </div>
            <div class="mt-3 flex gap-2">
                <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-white border px-4 py-2 rounded-full text-sm focus:outline-none">
                <button onclick="sendMessage()" class="bg-red-600 text-white px-5 py-2 rounded-full text-sm font-semibold hover:bg-red-700">Send</button>
            </div>
        </section>

        <section id="tab-profile" class="tab-content hidden text-center mt-6">
            <div class="w-24 h-24 bg-gray-200 rounded-full mx-auto flex items-center justify-between text-4xl shadow-inner border">👤</div>
            <h1 class="text-2xl font-bold mt-3">Your Profile Name</h1>
            <p class="text-gray-500 text-sm">@username</p>
            
            <div class="flex justify-center gap-4 mt-4 border-b pb-2 text-sm font-semibold">
                <span class="text-black border-b-2 border-black pb-2 cursor-pointer">Created Pins</span>
            </div>

            <div id="profile-pin-container" class="pin-grid mt-6">
                </div>
        </section>

    </div>

    <script>
        // Initial Dummy Media Data
        const dummyPins = [
            { id: 1, title: "Aesthetic Room Design", img: "https://images.unsplash.com/photo-1513694203232-719a280e022f?w=500" },
            { id: 2, title: "Future Tech Setup", img: "https://images.unsplash.com/photo-1547082299-de196ea013d6?w=500" },
            { id: 3, title: "Dark Minimal Wallpaper", img: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=500" },
            { id: 4, title: "Nature Mountain View", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500" }
        ];

        let allPins = [...dummyPins];

        // Load data from LocalStorage if available
        if (localStorage.getItem('userPins')) {
            const savedPins = JSON.parse(localStorage.getItem('userPins'));
            allPins = [...savedPins, ...allPins];
        }

        // Render Home and Profile Grid
        function renderGrid() {
            const homeContainer = document.getElementById('pin-container');
            const profileContainer = document.getElementById('profile-pin-container');
            
            homeContainer.innerHTML = '';
            profileContainer.innerHTML = '';

            allPins.forEach(pin => {
                const pinHtml = `
                    <div class="pin-item bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm group relative cursor-pointer hover:shadow-md transition">
                        <img src="${pin.img}" class="w-full h-auto object-cover group-hover:opacity-95 transition">
                        <div class="p-3 text-xs font-semibold text-gray-700 truncate">${pin.title}</div>
                    </div>
                `;
                homeContainer.innerHTML += pinHtml;

                // If pin is uploaded by user (id is string timestamp)
                if (typeof pin.id === 'string') {
                    profileContainer.innerHTML += pinHtml;
                }
            });
        }

        // Handle Image Uploading
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const newPin = {
                    id: 'user-' + Date.now(),
                    title: file.name.split('.')[0] || "My Uploaded Pin",
                    img: e.target.result // Base64 image encoding
                };

                // Add to current pins array
                allPins.unshift(newPin);
                
                // Save only user uploaded pins to local storage
                const savedPins = JSON.parse(localStorage.getItem('userPins')) || [];
                savedPins.unshift(newPin);
                localStorage.setItem('userPins', JSON.stringify(savedPins));

                renderGrid();
                alert("Photo uploaded successfully to your local dashboard!");
            };
            reader.readAsDataURL(file);
        }

        // Tab Switching Engine (Home / Messages / Profile)
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');

            // Handle active navbar button styles
            document.getElementById('btn-home').className = tabName === 'home' ? "bg-black text-white px-4 py-2 rounded-full text-sm font-semibold" : "text-black hover:bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold";
            if(tabName === 'messages') document.getElementById('msg-badge').classList.add('hidden');
        }

        // Search Filtering Logic
        function filterPins() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const homeContainer = document.getElementById('pin-container');
            homeContainer.innerHTML = '';

            allPins.forEach(pin => {
                if (pin.title.toLowerCase().includes(query)) {
                    homeContainer.innerHTML += `
                        <div class="pin-item bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm group relative cursor-pointer hover:shadow-md transition">
                            <img src="${pin.img}" class="w-full h-auto object-cover group-hover:opacity-95 transition">
                            <div class="p-3 text-xs font-semibold text-gray-700 truncate">${pin.title}</div>
                        </div>
                    `;
                }
            });
        }

        // Dummy Message Chat Box Functionality
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            // User Message
            chatBox.innerHTML += `
                <div class="bg-red-600 text-white p-3 rounded-xl rounded-tr-none text-sm max-w-[80%] ml-auto text-right">
                    ${input.value}
                </div>
            `;
            
            const currentText = input.value;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Automatic Bot Reply after 1 second
            setTimeout(() => {
                chatBox.innerHTML += `
                    <div class="bg-gray-100 text-gray-800 p-3 rounded-xl rounded-tl-none text-sm max-w-[80%]">
                        Wow, that's interesting! Thanks for checking out the chat tab.
                    </div>
                `;
                chatBox.scrollTop = chatBox.scrollHeight;
                if(document.getElementById('tab-messages').classList.contains('hidden')) {
                    document.getElementById('msg-badge').classList.remove('hidden');
                }
            }, 1000);
        }

        // Initial Load Call
        renderGrid();
    </script>
</body>
  </html>
