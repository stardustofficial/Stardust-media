<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARDUST - Real Media Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .pin-grid { columns: 2; column-gap: 12px; }
        .pin-item { break-inside: avoid; margin-bottom: 12px; }
    </style>
</head>
<body class="bg-white font-sans antialiased text-gray-900 pb-20">

    <nav class="sticky top-0 bg-white px-4 py-3 flex items-center justify-between gap-3 z-50 shadow-sm">
        <div class="text-black font-black text-xl tracking-tighter">STARDUST</div>
        <div class="flex-1 relative">
            <input type="text" id="search-bar" onkeyup="filterPins()" placeholder="Search stardust..." class="w-full bg-[#F1F1F1] pl-4 pr-4 py-2 rounded-full text-sm focus:outline-none">
        </div>
    </nav>

    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleUpload(event)">

    <div class="p-3 max-w-7xl mx-auto">
        <section id="tab-home" class="tab-content">
            <div id="pin-container" class="pin-grid">
                </div>
        </section>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-2 px-6 flex justify-around items-center z-50">
        <button onclick="document.getElementById('file-input').click()" class="flex flex-col items-center gap-0.5 text-black">
            <span class="text-xl">➕</span>
            <span class="text-[10px] font-bold">Real Upload</span>
        </button>
    </div>

    <script>
        // Aapke screenshot wala exact config data
        const firebaseConfig = {
            apiKey: "AIzaSyAuFUuH0pnldHPlW0BJDR8P...", 
            authDomain: "stardust-media-1ffc8.firebaseapp.com",
            databaseURL: "https://stardust-media-1ffc8-default-rtdb.firebaseio.com", // Firebase automatically sets this
            projectId: "stardust-media-1ffc8",
            storageBucket: "stardust-media-1ffc8.appspot.com",
            messagingSenderId: "323937105300",
            appId: "1:323937105300:web:290560ce7e0d620c3dcb81",
            measurementId: "G-ZRRV7S95HT"
        };
        
        // Firebase Initialize kiya
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 📥 Cloud Database se data live read karna
        database.ref('pins').on('value', (snapshot) => {
            const container = document.getElementById('pin-container');
            container.innerHTML = '';
            const data = snapshot.val();
            
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const pin = data[key];
                    container.innerHTML += `
                        <div class="pin-item bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm animate-fade-in">
                            <img src="${pin.img}" class="w-full h-auto object-cover">
                            <div class="p-2 text-[11px] font-bold text-gray-800 truncate">${pin.title}</div>
                        </div>`;
                });
            } else {
                container.innerHTML = '<div class="text-center text-gray-400 text-sm col-span-2 py-10">No media uploaded yet. Be the first!</div>';
            }
        });

        // 📤 Cloud Database me data insert (Upload) karna
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                database.ref('pins').push({
                    title: file.name.split('.')[0] || "Stardust Premium",
                    img: e.target.result
                }).then(() => {
                    alert("Boom! Photo cloud me chali gayi aur ab sabhi users ko dikhegi!");
                }).catch((error) => {
                    alert("Error: Database me Rules check karo! " + error.message);
                });
            };
            reader.readAsDataURL(file);
        }

        function filterPins() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const items = document.querySelectorAll('.pin-item');
            items.forEach(item => {
                const title = item.innerText.toLowerCase();
                if(title.includes(query)) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        }
    </script>
</body>
            </html>
