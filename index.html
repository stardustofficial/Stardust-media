<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARDUST - Premium Media Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .pin-grid {
            columns: 2;
            column-gap: 12px;
        }
        .pin-item {
            break-inside: avoid;
            margin-bottom: 12px;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-white font-sans antialiased text-gray-900 pb-20">

    <nav class="sticky top-0 bg-white px-4 py-3 flex items-center justify-between gap-3 z-50 shadow-sm">
        <div onclick="switchTab('home')" class="text-black font-black text-xl tracking-tighter cursor-pointer">STARDUST</div>
        <div class="flex-1 relative">
            <span class="absolute left-3 top-2.5 text-gray-400 text-xs">🔍</span>
            <input type="text" id="search-bar" onkeyup="filterPins()" placeholder="Search stardust..." class="w-full bg-[#F1F1F1] pl-8 pr-4 py-2 rounded-full text-sm focus:outline-none focus:ring-1 focus:ring-black">
        </div>
    </nav>

    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleUpload(event)">
    <input type="file" id="profile-pic-input" accept="image/*" class="hidden" onchange="handleProfilePicChange(event)">

    <div class="p-3 max-w-7xl mx-auto">

        <section id="tab-home" class="tab-content">
            <div id="pin-container" class="pin-grid">
                </div>
        </section>

        <section id="tab-messages" class="tab-content hidden max-w-md mx-auto bg-[#F9F9F9] border border-gray-100 rounded-3xl p-4 shadow-inner">
            <h2 class="text-lg font-bold mb-3 flex items-center gap-2">💬 STARDUST Assistant</h2>
            <div class="space-y-3 h-80 overflow-y-auto p-3 bg-white rounded-2xl border border-gray-100" id="chat-box">
                <div class="bg-[#F1F1F1] text-gray-800 p-3 rounded-2xl rounded-tl-none text-sm max-w-[85%]">
                    Welcome to STARDUST! Aapka real cloud database connect ho chuka hai. Niche ke (+) button se kuch bhi upload karo, wo turant sabhi logon ko dikhega!
                </div>
            </div>
            <div class="mt-3 flex gap-2">
                <input type="text" id="chat-input" placeholder="Ask anything to assistant..." class="flex-1 bg-white border border-gray-200 px-4 py-2.5 rounded-full text-sm focus:outline-none">
                <button onclick="sendMessage()" class="bg-black text-white px-5 py-2.5 rounded-full text-sm font-semibold hover:bg-gray-800">Send</button>
            </div>
        </section>

        <section id="tab-profile" class="tab-content hidden text-center mt-4 max-w-md mx-auto">
            <div class="relative w-24 h-24 mx-auto group cursor-pointer" onclick="document.getElementById('profile-pic-input').click()">
                <img id="profile-img" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" class="w-24 h-24 rounded-full object-cover border border-gray-200 shadow-sm">
                <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition text-white text-xs">Change</div>
            </div>
            
            <div class="mt-3 px-4">
                <h1 id="profile-name" onclick="editProfileField('name')" class="text-xl font-black cursor-pointer hover:bg-gray-50 rounded py-1 px-2 border border-dashed border-transparent hover:border-gray-300">STARDUST User</h1>
                <p id="profile-username" onclick="editProfileField('username')" class="text-gray-500 text-xs mt-1 cursor-pointer hover:bg-gray-50 rounded py-0.5 px-2 border border-dashed border-transparent hover:border-gray-300">@stardust_creator</p>
            </div>
            
            <div class="flex justify-center gap-4 mt-6 border-b pb-2 text-sm font-bold">
                <span class="text-black border-b-2 border-black pb-2">My Device Uploads</span>
            </div>

            <div id="profile-pin-container" class="pin-grid mt-4"></div>
        </section>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 py-2 px-6 flex justify-around items-center z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.03)]">
        <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center gap-0.5 text-black">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        
        <button onclick="document.getElementById('file-input').click()" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-black">
            <span class="text-xl">➕</span>
            <span class="text-[10px] font-bold">Create</span>
        </button>

        <button onclick="switchTab('messages')" id="nav-messages" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-black relative">
            <span class="text-xl">💬</span>
            <span class="text-[10px] font-bold">Inbox</span>
            <span id="msg-badge" class="absolute top-0 right-1 bg-black w-2 h-2 rounded-full hidden"></span>
        </button>

        <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-black">
            <span class="text-xl">👤</span>
            <span class="text-[10px] font-bold">Profile</span>
        </button>
    </div>

    <script>
        // AAPKA APNA ABSOLUTE CORRECT FIREBASE CONFIG TEXT
        const firebaseConfig = {
            apiKey: "AIzaSyAuFUuH0pnldHPlW0BJDR8Pj8Q09mG7zGc",
            authDomain: "stardust-media-1ffc8.firebaseapp.com",
            databaseURL: "https://stardust-media-1ffc8-default-rtdb.firebaseio.com",
            projectId: "stardust-media-1ffc8",
            storageBucket: "stardust-media-1ffc8.firebasestorage.app",
            messagingSenderId: "323937105300",
            appId: "1:323937105300:web:290560ce7e0d620c3dcb81",
            measurementId: "G-ZRRV7S95HT"
        };
        
        // Initialize Firebase Global Connection
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let localUploadedPins = JSON.parse(localStorage.getItem('userPins')) || [];

        // App start hote hi data aur local profile fetch karega
        function initProfile() {
            if(localStorage.getItem('profile_name')) document.getElementById('profile-name').innerText = localStorage.getItem('profile_name');
            if(localStorage.getItem('profile_user')) document.getElementById('profile-username').innerText = localStorage.getItem('profile_user');
            if(localStorage.getItem('profile_img')) document.getElementById('profile-img').src = localStorage.getItem('profile_img');
            renderProfileGrid();
        }

        // 📥 CLOUD REALTIME CONNECTION (Jo photo dusre dalenge wo yahan instant automatic load hogi)
        database.ref('pins').on('value', (snapshot) => {
            const container = document.getElementById('pin-container');
            container.innerHTML = '';
            const data = snapshot.val();
            
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const pin = data[key];
                    container.innerHTML += `
                        <div class="pin-item bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
                            <img src="${pin.img}" class="w-full h-auto object-cover">
                            <div class="p-2 text-[11px] font-bold text-gray-800 truncate">${pin.title}</div>
                        </div>`;
                });
            } else {
                container.innerHTML = '<div class="text-center text-gray-400 text-sm py-10 col-span-2">Welcome to STARDUST Network! No media shared yet.</div>';
            }
        });

        // Profile tab me sirf user ki apni khud ki dali photos dikhane ke liye
        function renderProfileGrid() {
            const profileContainer = document.getElementById('profile-pin-container');
            profileContainer.innerHTML = '';
            localUploadedPins.forEach(pin => {
                profileContainer.innerHTML += `
                    <div class="pin-item bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
                        <img src="${pin.img}" class="w-full h-auto object-cover">
                        <div class="p-2 text-[11px] font-bold text-gray-800 truncate">${pin.title}</div>
                    </div>`;
            });
        }

        // 📤 CLOUD MULTI-USER UPLOAD ENGINE
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const pinData = {
                    title: file.name.split('.')[0] || "Stardust Hub Media",
                    img: e.target.result // Base64 encoding for public view
                };

                // 1. Send data globally to database (Sabhi phones par dikhega)
                database.ref('pins').push(pinData).then(() => {
                    alert("Boom! Photo database me upload ho gayi! Sabhi users ise dekh sakte hain.");
                }).catch((err) => {
                    alert("Database Rules configuration issue! " + err.message);
                });

                // 2. Local memory update for tracking inside profile
                localUploadedPins.unshift(pinData);
                localStorage.setItem('userPins', JSON.stringify(localUploadedPins));
                renderProfileGrid();
            };
            reader.readAsDataURL(file);
        }

        // Profile details custom changing logic
        function editProfileField(type) {
            if(type === 'name') {
                const current = document.getElementById('profile-name').innerText;
                const promptVal = prompt("Set your premium name:", current);
                if(promptVal) {
                    document.getElementById('profile-name').innerText = promptVal;
                    localStorage.setItem('profile_name', promptVal);
                }
            } else {
                const current = document.getElementById('profile-username').innerText;
                const promptVal = prompt("Set your username (start with @):", current);
                if(promptVal) {
                    document.getElementById('profile-username').innerText = promptVal;
                    localStorage.setItem('profile_user', promptVal);
                }
            }
        }

        function handleProfilePicChange(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profile-img').src = e.target.result;
                localStorage.setItem('profile_img', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // UI Tab Switch Engine 
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            
            const navs = ['home', 'messages', 'profile'];
            navs.forEach(n => {
                const el = document.getElementById(`nav-${n}`);
                if(el) el.className = n === tabName ? "flex flex-col items-center gap-0.5 text-black" : "flex flex-col items-center gap-0.5 text-gray-400 hover:text-black";
            });
            if(tabName === 'messages') document.getElementById('msg-badge').classList.add('hidden');
        }

        // Intelligent Assistant Message logic
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            chatBox.innerHTML += `<div class="bg-black text-white p-3 rounded-2xl rounded-tr-none text-sm max-w-[85%] ml-auto text-right font-medium">${input.value}</div>`;
            const userMsg = input.value.toLowerCase();
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                let reply = "STARDUST Core deployment stable. Aap is system ke head owner hain.";
                if(userMsg.includes('owner') || userMsg.includes('kon ho')) reply = "Aap hi iske asli creator ho bhai! Aapka code Firebase cloud data clusters se connected hai.";
                else if(userMsg.includes('upload') || userMsg.includes('photo')) reply = "Niche Navigation bar me diye (+) Create icon se real-time multi-user upload system live kaam kar raha hai.";
                
                chatBox.innerHTML += `<div class="bg-[#F1F1F1] text-gray-800 p-3 rounded-2xl rounded-tl-none text-sm max-w-[85%] font-medium">${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
        }

        // Live Search Filter
        function filterPins() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const items = document.querySelectorAll('.pin-item');
            items.forEach(item => {
                if(item.innerText.toLowerCase().includes(query)) item.style.display = "block";
                else item.style.display = "none";
            });
        }

        // Run functions on load
        initProfile();
    </script>
</body>
                    </html>
