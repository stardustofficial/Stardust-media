<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARDUST - Premium Media Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .pin-grid {
            columns: 2;
            column-gap: 16px;
        }
        .pin-item {
            break-inside: avoid;
            margin-bottom: 16px;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
        /* Smooth tab transition */
        .tab-content {
            transition: opacity 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-white font-sans antialiased text-gray-900 pb-24">

    <nav class="sticky top-0 bg-white/95 backdrop-blur-md px-5 py-4 flex items-center justify-between gap-4 z-50 border-b border-gray-100">
        <div onclick="switchTab('home')" class="text-red-600 font-black text-2xl tracking-tighter cursor-pointer select-none">STARDUST</div>
        <div class="flex-1 relative">
            <svg class="absolute left-3 top-3 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="search-bar" onkeyup="filterPins()" placeholder="Search inspired ideas..." class="w-full bg-[#E9E9E9] hover:bg-[#E1E1E1] pl-10 pr-4 py-2.5 rounded-full text-sm font-medium focus:outline-none focus:ring-2 focus:ring-black/10 transition">
        </div>
    </nav>

    <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleUpload(event)">
    <input type="file" id="profile-pic-input" accept="image/*" class="hidden" onchange="handleProfilePicChange(event)">

    <div class="p-4 max-w-7xl mx-auto">

        <section id="tab-home" class="tab-content row">
            <div id="pin-container" class="pin-grid">
                </div>
        </section>

        <section id="tab-messages" class="tab-content hidden max-w-md mx-auto bg-gray-50 border border-gray-200/60 rounded-3xl p-5 shadow-sm">
            <h2 class="text-lg font-bold mb-4 text-gray-800 flex items-center gap-2">
                <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                Stardust Updates
            </h2>
            <div class="space-y-3 h-80 overflow-y-auto p-3 bg-white rounded-2xl border border-gray-100" id="chat-box">
                <div class="bg-[#E9E9E9] text-gray-800 p-3.5 rounded-2xl rounded-tl-none text-sm max-w-[85%] font-medium">
                    Welcome back! Aapka backend system cloud network se synced hai. Create icon se kuch bhi post karein, wo direct sabhi tak pahunchega.
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <input type="text" id="chat-input" placeholder="Write a message..." class="flex-1 bg-white border border-gray-200 px-4 py-3 rounded-full text-sm focus:outline-none focus:border-gray-400">
                <button onclick="sendMessage()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-3 rounded-full text-sm font-bold transition">Send</button>
            </div>
        </section>

        <section id="tab-profile" class="tab-content hidden text-center mt-6 max-w-md mx-auto">
            <div class="relative w-28 h-28 mx-auto group cursor-pointer" onclick="document.getElementById('profile-pic-input').click()">
                <img id="profile-img" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" class="w-28 h-28 rounded-full object-cover border border-gray-100 shadow-inner">
                <div class="absolute bottom-0 right-0 bg-white border border-gray-200 p-1.5 rounded-full shadow-md hover:scale-105 transition">
                    <svg class="w-3.5 h-3.5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </div>
            </div>
            
            <div class="mt-4 px-4 flex flex-col items-center">
                <div onclick="editProfileField('name')" class="flex items-center gap-2 cursor-pointer group hover:bg-gray-50 px-3 py-1 rounded-full transition border border-transparent hover:border-gray-200">
                    <h1 id="profile-name" class="text-2xl font-bold tracking-tight text-gray-900">STARDUST User</h1>
                    <svg class="w-4 h-4 text-gray-400 opacity-60 group-hover:opacity-100 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </div>
                
                <div onclick="editProfileField('username')" class="flex items-center gap-1.5 mt-1 cursor-pointer group hover:bg-gray-50 px-2.5 py-0.5 rounded-full transition border border-transparent hover:border-gray-200">
                    <p id="profile-username" class="text-gray-500 text-sm font-medium">@stardust_creator</p>
                    <svg class="w-3.5 h-3.5 text-gray-400 opacity-0 group-hover:opacity-100 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </div>
            </div>
            
            <div class="flex justify-center gap-4 mt-8 border-b border-gray-100 pb-3 text-sm font-bold">
                <span class="text-gray-900 border-b-2 border-gray-900 pb-3 tracking-wide">Created Pins</span>
            </div>

            <div id="profile-pin-container" class="pin-grid mt-5"></div>
        </section>

    </div>

    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 max-w-sm w-[90%] bg-white/95 backdrop-blur-md py-3 px-6 flex justify-between items-center z-50 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-gray-100/80">
        <button onclick="switchTab('home')" id="nav-home" class="flex items-center justify-center p-2.5 rounded-full bg-black text-white transition-all duration-200">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
        </button>
        
        <button onclick="document.getElementById('file-input').click()" class="flex items-center justify-center p-2.5 rounded-full text-gray-500 hover:bg-gray-100 transition-all duration-200">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
        </button>

        <button onclick="switchTab('messages')" id="nav-messages" class="flex items-center justify-center p-2.5 rounded-full text-gray-500 hover:bg-gray-100 transition-all duration-200 relative">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        </button>

        <button onclick="switchTab('profile')" id="nav-profile" class="flex items-center justify-center p-2.5 rounded-full text-gray-500 hover:bg-gray-100 transition-all duration-200">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAuFUuH0pnldHPlW0BJDR8Pj8Q09mG7zGc",
            authDomain: "stardust-media-1ffc8.firebaseapp.com",
            databaseURL: "https://stardust-media-1ffc8-default-rtdb.firebaseio.com",
            projectId: "stardust-media-1ffc8",
            storageBucket: "stardust-media-1ffc8.firebasestorage.app",
            messagingSenderId: "323937105300",
            appId: "1:323937105300:web:290560ce7e0d620c3dcb81",
            measurementId: "G-ZRRV7S95HT"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let localUploadedPins = JSON.parse(localStorage.getItem('userPins')) || [];

        function initProfile() {
            if(localStorage.getItem('profile_name')) document.getElementById('profile-name').innerText = localStorage.getItem('profile_name');
            if(localStorage.getItem('profile_user')) document.getElementById('profile-username').innerText = localStorage.getItem('profile_user');
            if(localStorage.getItem('profile_img')) document.getElementById('profile-img').src = localStorage.getItem('profile_img');
            renderProfileGrid();
        }

        // 📥 CLOUD SYNC CORE: Auto-displays photos directly inside Home feed real-time
        database.ref('pins').on('value', (snapshot) => {
            const container = document.getElementById('pin-container');
            container.innerHTML = '';
            const data = snapshot.val();
            
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const pin = data[key];
                    container.innerHTML += `
                        <div class="pin-item bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm hover:opacity-95 transition cursor-zoom-in">
                            <img src="${pin.img}" class="w-full h-auto object-cover">
                            <div class="p-2.5 text-xs font-semibold text-gray-800 truncate">${pin.title}</div>
                        </div>`;
                });
            } else {
                container.innerHTML = '<div class="text-center text-gray-400 text-sm py-16 col-span-2 font-medium">No ideas shared yet. Be the first one!</div>';
            }
        });

        function renderProfileGrid() {
            const profileContainer = document.getElementById('profile-pin-container');
            profileContainer.innerHTML = '';
            
            if(localUploadedPins.length > 0) {
                localUploadedPins.forEach(pin => {
                    profileContainer.innerHTML += `
                        <div class="pin-item bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
                            <img src="${pin.img}" class="w-full h-auto object-cover">
                            <div class="p-2.5 text-xs font-semibold text-gray-800 truncate">${pin.title}</div>
                        </div>`;
                });
            } else {
                profileContainer.innerHTML = '<div class="text-center text-gray-400 text-xs py-10 col-span-2">No local uploads tracked from this device yet.</div>';
            }
        }

        // 📤 CLOUD MULTI-USER UPLOAD CONTROLLER
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const pinData = {
                    title: file.name.split('.')[0] || "Stardust Premium Creative",
                    img: e.target.result
                };

                // Push seamlessly to global realtime node
                database.ref('pins').push(pinData).then(() => {
                    // Instantly reroute user view to real-time sync screen
                    switchTab('home');
                }).catch((err) => {
                    alert("Upload Engine Interrupted: " + err.message);
                });

                localUploadedPins.unshift(pinData);
                localStorage.setItem('userPins', JSON.stringify(localUploadedPins));
                renderProfileGrid();
            };
            reader.readAsDataURL(file);
        }

        function editProfileField(type) {
            if(type === 'name') {
                const current = document.getElementById('profile-name').innerText;
                const promptVal = prompt("Change profile Display Name:", current);
                if(promptVal && promptVal.trim() !== "") {
                    document.getElementById('profile-name').innerText = promptVal;
                    localStorage.setItem('profile_name', promptVal);
                }
            } else {
                const current = document.getElementById('profile-username').innerText;
                const promptVal = prompt("Change Username (@):", current);
                if(promptVal && promptVal.trim() !== "") {
                    let formatted = promptVal.startsWith('@') ? promptVal : '@' + promptVal;
                    document.getElementById('profile-username').innerText = formatted;
                    localStorage.setItem('profile_user', formatted);
                }
            }
        }

        function handleProfilePicChange(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profile-img').src = e.target.result;
                localStorage.setItem('profile_img', e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // Professional UI Active Switch Engine
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabName}`).classList.remove('hidden');
            
            const tabs = ['home', 'messages', 'profile'];
            tabs.forEach(t => {
                const button = document.getElementById(`nav-${t}`);
                if(button) {
                    if(t === tabName) {
                        button.className = "flex items-center justify-center p-2.5 rounded-full bg-black text-white transition-all duration-200";
                    } else {
                        button.className = "flex items-center justify-center p-2.5 rounded-full text-gray-500 hover:bg-gray-100 transition-all duration-200";
                    }
                }
            });
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            chatBox.innerHTML += `<div class="bg-black text-white p-3.5 rounded-2xl rounded-tr-none text-sm max-w-[85%] ml-auto text-right font-medium">${input.value}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                chatBox.innerHTML += `<div class="bg-[#E9E9E9] text-gray-800 p-3.5 rounded-2xl rounded-tl-none text-sm max-w-[85%] font-medium">STARDUST Cloud engine sync is operational. All parameters are fully stable.</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1000);
        }

        function filterPins() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.pin-item').forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(query) ? "block" : "none";
            });
        }

        initProfile();
    </script>
</body>
        </html>
